server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # Health check endpoint for Azure
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect root to store
    location = / {
        return 301 https://shop.fridaythreads.com;
    }

    # Redirect /store/[path] to store.fridaythreads.com/[path]
    location ~ ^/store/(.*)$ {
        return 301 https://store.fridaythreads.com/$1;
    }

    # Catch-all for any other paths - redirect to store root
    location / {
        return 301 https://shop.fridaythreads.com;
    }
}
